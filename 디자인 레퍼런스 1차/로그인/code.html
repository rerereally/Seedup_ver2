<div class="relative z-10">
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">Seedup</h1>
</div>
<div class="relative z-10 max-w-md">
<h2 class="font-display-lg text-display-lg text-on-surface mb-md">뉴스를 <br><span class="text-primary">프로젝트로</span><br>만들다</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-lg">트렌드를 분석하고, 아이디어를 검증하여, 실제 비즈니스 프로젝트로 발전시키는 가장 빠른 방법.</p>
<!-- Bento style feature highlight -->
<div class="grid grid-cols-2 gap-sm">
<div class="bg-surface p-md rounded-lg border border-surface-variant flex flex-col gap-xs transition-shadow duration-200 hover:shadow-sm">
<span class="material-symbols-outlined text-primary text-[24px]">trending_up</span>
<span class="font-label-md text-label-md text-on-surface">데이터 기반 트렌드 분석</span>
</div>
<div class="bg-surface p-md rounded-lg border border-surface-variant flex flex-col gap-xs transition-shadow duration-200 hover:shadow-sm">
<span class="material-symbols-outlined text-primary text-[24px]">lightbulb</span>
<span class="font-label-md text-label-md text-on-surface">AI 아이디어 제안</span>
</div>
</div>
</div>
<div class="relative z-10 font-label-sm text-label-sm text-on-surface-variant">

</div>
<div class="max-w-[400px] w-full mx-auto">
<div class="text-center mb-xl">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">환영합니다</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Seedup 계정으로 로그인하세요</p>
</div>
<!-- Primary Login Action: Google -->
<button class="w-full h-[48px] bg-primary text-on-primary rounded-DEFAULT font-label-md text-label-md flex items-center justify-center gap-xs hover:bg-on-primary-fixed-variant transition-colors duration-200 mb-lg shadow-sm">
<span class="material-symbols-outlined text-[20px]">account_circle</span>

                </button>
<div class="flex items-center gap-sm mb-lg">
<div class="h-[1px] bg-surface-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase">또는 이메일로 로그인</span>
<div class="h-[1px] bg-surface-variant flex-1"></div>
</div>
<!-- Email Form -->
<form class="flex flex-col gap-md mb-lg">
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface" for="email">이메일 주소</label>
<input class="h-[40px] px-sm rounded-DEFAULT border border-surface-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" placeholder="name@company.com" type="email">
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface" for="password">비밀번호</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">비밀번호를 잊으셨나요?</a>
</div>
<input class="h-[40px] px-sm rounded-DEFAULT border border-surface-variant bg-surface text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" placeholder="••••••••" type="password">
</div>
<button class="w-full h-[40px] bg-surface-container-high text-on-surface rounded-DEFAULT border border-surface-variant font-label-md text-label-md hover:bg-surface-variant transition-colors duration-200 mt-xs" type="submit">
                        이메일로 로그인
                    </button>
</form>
<div class="text-center font-body-md text-body-md text-on-surface-variant mb-xl">
